# Minimal local Airflow (LocalExecutor) for running the medallion DAG.
# Mounts the repo so the DAG's BashOperators can call ingestion/ and dbt_project/.
# Usage:
#   cd infra && docker compose up airflow-init && docker compose up
# then open http://localhost:8080  (user/pass: airflow / airflow)
x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    NYC_WAREHOUSE: /opt/project/warehouse/nyc_taxi.duckdb
    PIP_ADDITIONAL_REQUIREMENTS: "pyspark==3.5.3 dbt-duckdb==1.10.1 duckdb pyarrow pandas"
  volumes:
    - ../:/opt/project
    - ../airflow/dags:/opt/airflow/dags
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username airflow --password airflow --firstname a --lastname b --role Admin --email a@b.c"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports: ["8080:8080"]
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
